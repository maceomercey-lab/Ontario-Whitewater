<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontario Whitewater — run finder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12181B;
    --panel:#1A2226;
    --panel-2:#212B30;
    --ink:#E7EEEF;
    --ink-dim:#8FA3A8;
    --ink-faint:#5C6A6E;
    --line:rgba(231,238,239,0.09);
    --teal:#2FB6A6;
    --teal-dim:#1D7267;
    --putin:#6FCF52;
    --takeout:#E8823A;
    --warn:#E4572E;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:0.02em;margin:0;}

  .topbar{
    position:relative;z-index:1000;
    display:flex;align-items:center;gap:14px;
    padding:14px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
  }
  .contour-strip{
    position:absolute;inset:0;pointer-events:none;opacity:0.35;
    background-image:
      radial-gradient(circle at 15% 50%, transparent 24px, transparent 25px, rgba(47,182,166,0.10) 26px, transparent 27px),
      radial-gradient(circle at 15% 50%, transparent 34px, transparent 35px, rgba(47,182,166,0.08) 36px, transparent 37px),
      radial-gradient(circle at 85% 20%, transparent 18px, transparent 19px, rgba(47,182,166,0.10) 20px, transparent 21px);
    background-size:100% 100%;
  }
  .hamburger{
    position:relative;z-index:1;
    width:38px;height:38px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--ink);cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .hamburger:hover{border-color:var(--teal);}
  .hamburger svg{width:18px;height:18px;}
  .brand{position:relative;z-index:1;display:flex;flex-direction:column;line-height:1.15;}
  .brand .title{font-size:19px;color:var(--ink);}
  .brand .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal);letter-spacing:0.08em;text-transform:uppercase;}

  .layout{position:relative;height:calc(100% - 68px);width:100%;overflow:hidden;}
  #map{position:absolute;inset:0;background:#0d1113;}
  .leaflet-container{background:#0d1113;font-family:'Inter',sans-serif;}

  .run-dot{
    width:16px;height:16px;border-radius:50%;
    background:var(--teal);border:2px solid #0d1113;
    box-shadow:0 0 0 2px rgba(47,182,166,0.35);
  }
  .run-dot.putin{background:var(--putin);box-shadow:0 0 0 2px rgba(111,207,82,0.35);}
  .run-dot.takeout{background:var(--takeout);box-shadow:0 0 0 2px rgba(232,130,58,0.35);}
  .run-dot.other{background:var(--ink-faint);box-shadow:0 0 0 2px rgba(140,150,150,0.25);}

  .leaflet-tooltip.run-tip{
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    font-family:'Inter',sans-serif;font-size:12px;padding:4px 9px;border-radius:6px;
    box-shadow:none;
  }
  .leaflet-tooltip.run-tip::before{display:none;}

  .preview-card{
    position:absolute;left:20px;bottom:20px;z-index:900;
    width:300px;max-width:calc(100vw - 40px);
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;display:none;
  }
  .preview-card.show{display:block;}
  .preview-card .river-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:0.08em;}
  .preview-card h3{font-size:16px;margin-top:4px;}
  .preview-card .region{font-size:12px;color:var(--ink-dim);margin-top:2px;}
  .preview-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px;color:var(--ink-dim);border-top:1px solid var(--line);padding-top:10px;}
  .grade-flag{
    display:inline-flex;align-items:center;gap:5px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink);
    background:var(--panel-2);border:1px solid var(--line);padding:3px 8px;border-radius:4px;
  }
  .grade-flag::before{content:'';width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:7px solid var(--warn);}
  .gauge-line{font-family:'IBM Plex Mono',monospace;font-size:12px;}
  .gauge-live{color:var(--teal);}
  .preview-hint{margin-top:10px;font-size:11px;color:var(--ink-faint);}

  .sidebar{
    position:absolute;top:0;left:0;bottom:0;z-index:1100;
    width:340px;max-width:88vw;
    background:var(--panel);border-right:1px solid var(--line);
    transform:translateX(-100%);transition:transform 0.22s ease;
    display:flex;flex-direction:column;overflow:hidden;
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);}
  .sidebar-head h2{font-size:16px;}
  .close-btn{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:20px;line-height:1;}
  .close-btn:hover{color:var(--ink);}
  .tabs{display:flex;border-bottom:1px solid var(--line);}
  .tab-btn{
    flex:1;padding:11px 0;background:none;border:none;color:var(--ink-dim);
    font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;
    cursor:pointer;border-bottom:2px solid transparent;
  }
  .tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}
  .tab-panel{display:none;padding:16px 18px;overflow-y:auto;flex:1;}
  .tab-panel.active{display:block;}

  label{display:block;font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.05em;margin:12px 0 5px;}
  label:first-child{margin-top:0;}
  input[type=text],input[type=number],textarea,select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
    color:var(--ink);padding:8px 10px;font-family:'Inter',sans-serif;font-size:13px;
  }
  textarea{min-height:64px;resize:vertical;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal);}
  .pick-row{display:flex;gap:8px;margin-top:6px;}
  .pick-btn{
    flex:1;padding:8px 6px;border-radius:6px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--ink);font-size:12px;cursor:pointer;
  }
  .pick-btn.set{border-color:var(--teal);color:var(--teal);}
  .pick-btn.active-pick{border-color:var(--warn);color:var(--warn);}
  .submit-btn{
    margin-top:16px;width:100%;padding:10px;border-radius:6px;border:none;
    background:var(--teal);color:#082019;font-family:'Oswald',sans-serif;font-weight:600;
    letter-spacing:0.04em;cursor:pointer;font-size:13px;
  }
  .submit-btn:hover{background:#3ecabb;}
  .form-note{font-size:11px;color:var(--ink-faint);margin-top:10px;line-height:1.5;}

  .search-input{margin-bottom:12px;}
  .search-results{display:flex;flex-direction:column;gap:6px;}
  .search-item{
    text-align:left;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
    padding:9px 11px;cursor:pointer;color:var(--ink);font-size:13px;
  }
  .search-item:hover{border-color:var(--teal);}
  .search-item .si-region{display:block;font-size:11px;color:var(--ink-dim);margin-top:2px;}
  .search-item .si-badge{
    display:inline-block;margin-top:4px;font-family:'IBM Plex Mono',monospace;font-size:10px;
    padding:1px 6px;border-radius:3px;background:var(--panel);color:var(--ink-faint);
  }
  .search-item .si-badge.curated{color:var(--teal);}
  .empty-note{font-size:12px;color:var(--ink-faint);}

  .detail-overlay{
    position:absolute;inset:0;z-index:1300;background:var(--bg);
    display:none;overflow-y:auto;
  }
  .detail-overlay.show{display:block;}
  .detail-inner{max-width:640px;margin:0 auto;padding:28px 24px 60px;}
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--ink-dim);
    cursor:pointer;font-size:13px;margin-bottom:18px;
  }
  .back-btn:hover{color:var(--teal);}
  .detail-river-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal);text-transform:uppercase;letter-spacing:0.09em;}
  .detail-title{font-size:30px;margin-top:6px;}
  .detail-region{color:var(--ink-dim);font-size:14px;margin-top:4px;}
  .detail-badges{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .detail-desc{margin-top:22px;line-height:1.7;color:var(--ink);font-size:14.5px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px;}
  .detail-block{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
  .detail-block .db-label{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-faint);}
  .detail-block .db-name{font-size:14px;margin-top:6px;}
  .detail-block .db-coords{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-dim);margin-top:4px;}
  .putin-block{border-left:3px solid var(--putin);}
  .takeout-block{border-left:3px solid var(--takeout);}
  .gauge-block{margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
  .gauge-block a{color:var(--teal);}
  .safety-note{
    margin-top:26px;font-size:12px;color:var(--ink-dim);line-height:1.6;
    border-top:1px solid var(--line);padding-top:16px;
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--panel-2);border-radius:4px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="contour-strip"></div>
  <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="brand">
    <span class="title">Ontario Whitewater</span>
    <span class="sub">Run finder &amp; gauge board</span>
  </div>
</div>

<div class="layout">
  <div id="map"></div>

  <div class="preview-card" id="previewCard">
    <span class="river-tag" id="pcRiver"></span>
    <h3 id="pcName"></h3>
    <div class="region" id="pcRegion"></div>
    <div class="preview-row">
      <span class="grade-flag" id="pcGrade"></span>
      <span class="gauge-line" id="pcGauge"></span>
    </div>
    <div class="preview-hint">Click the pin for the full run page</div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h2>Menu</h2>
      <button class="close-btn" id="closeSidebar">&times;</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="search">Search rivers</button>
      <button class="tab-btn" data-tab="add">Add a run</button>
    </div>

    <div class="tab-panel active" id="tab-search">
      <input type="text" class="search-input" id="searchInput" placeholder="Try &quot;Petawawa&quot; or &quot;Spanish River&quot;">
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="tab-panel" id="tab-add">
      <label>Run name</label>
      <input type="text" id="addName" placeholder="e.g. Elora Gorge run">
      <label>River</label>
      <input type="text" id="addRiver" placeholder="e.g. Grand River">
      <label>Region</label>
      <input type="text" id="addRegion" placeholder="e.g. Elora, ON">
      <label>Grade</label>
      <select id="addGrade">
        <option>I</option><option>I–II</option><option>II</option><option>II–III</option>
        <option>III</option><option>III–IV</option><option>IV</option><option>IV–V</option><option>V+</option>
      </select>
      <label>Description</label>
      <textarea id="addDesc" placeholder="Notable rapids, hazards, best season to run it..."></textarea>
      <label>Put-in and take-out</label>
      <div class="pick-row">
        <button class="pick-btn" id="pickPutIn" type="button">Set put-in on map</button>
        <button class="pick-btn" id="pickTakeOut" type="button">Set take-out on map</button>
      </div>
      <label>Gauge reference (optional)</label>
      <input type="text" id="addGaugeName" placeholder="e.g. Water Office station name">
      <button class="submit-btn" id="submitRun" type="button">Add run to map</button>
      <p class="form-note">After clicking a "set on map" button, click anywhere on the map to drop that point. Added runs are visible to everyone using this map.</p>
    </div>
  </div>

  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-inner" id="detailInner"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const CURATED_RUNS = [
  {
    id:'ottawa-main', name:"Main Channel (Rocher Fendu)", river:"Ottawa River",
    region:"Beachburg / Foresters Falls, ON", grade:"II–IV", length:"8 km",
    description:"Big-volume playboating water on the Quebec border. Named rapids including Butcher's Knife, McCoy's and Coliseum run reliably all summer thanks to upstream dam releases — the classic Ottawa Valley day and home to several kayak schools and outfitters.",
    putIn:{name:"McCoy's Rapids access, Herron Rd", lat:45.734, lng:-76.867},
    takeOut:{name:"Rocher Fendu take-out, Radiant Rd", lat:45.706, lng:-76.795},
    gaugeName:"Ottawa River (Rocher Fendu reach)", gaugeStation:null,
    gaugeInfoUrl:"https://wateroffice.ec.gc.ca/search/real_time_e.html"
  },
  {
    id:'madawaska-upper', name:"Upper Madawaska", river:"Madawaska River",
    region:"Whitney, ON (Algonquin Park boundary)", grade:"I–IV", length:"27 km",
    description:"A spring-fed run from Whitney to the Victoria–McCauley Lake Road bridge with about 15 rapids. Mandatory portages at Herman's Chute and Little Niagara. Usually only runnable through May before it drops too low.",
    putIn:{name:"Whitney access, Hwy 60", lat:45.499, lng:-78.219},
    takeOut:{name:"Victoria–McCauley Lake Rd bridge", lat:45.360, lng:-77.990},
    gaugeName:"Madawaska River near Whitney", gaugeStation:null,
    gaugeInfoUrl:"https://wateroffice.ec.gc.ca/search/real_time_e.html"
  },
  {
    id:'madawaska-palmer', name:"Palmer Rapids Run", river:"Madawaska River",
    region:"Palmer Rapids, ON", grade:"II–III", length:"8 km",
    description:"Often called the whitewater capital of Canada — a compact stretch of dependable play features near the Madawaska Kanu Centre, popular for both instruction and casual laps all summer.",
    putIn:{name:"Palmer Rapids bridge access", lat:45.350, lng:-77.340},
    takeOut:{name:"Aumond's Bay", lat:45.320, lng:-77.280},
    gaugeName:"Madawaska River at Palmer Rapids", gaugeStation:"02KD004",
    gaugeInfoUrl:"https://wateroffice.ec.gc.ca/report/real_time_e.html?stn=02KD004"
  },
  {
    id:'petawawa-algonquin', name:"Lake Travers Section", river:"Petawawa River",
    region:"Algonquin Provincial Park, ON", grade:"I–II (some mandatory portages)", length:"~30 km",
    description:"Remote Algonquin Park classic reached via Achray Rd and the Sand Lake Gate. Schooner and Five Mile Rapids offer long stretches of unbroken Class I–II; several kilometres of portaging bypass the harder sections.",
    putIn:{name:"Lake Travers via Achray Rd / Sand Lake Gate", lat:45.777, lng:-78.146},
    takeOut:{name:"Poplar Rapids access", lat:45.720, lng:-77.900},
    gaugeName:"Petawawa River (Algonquin Park reach)", gaugeStation:null,
    gaugeInfoUrl:"https://wateroffice.ec.gc.ca/search/real_time_e.html"
  },
  {
    id:'gull-minden', name:"Minden Whitewater Preserve", river:"Gull River",
    region:"Minden, ON (Haliburton Highlands)", grade:"II–IV", length:"0.8 km",
    description:"An 800 m engineered whitewater feature that hosted the 2015 Pan Am Games. Maintained by Whitewater Ontario — a short, high-repetition run popular for training and freestyle.",
    putIn:{name:"Preserve upper gate", lat:44.932, lng:-78.716},
    takeOut:{name:"Preserve take-out, below the falls", lat:44.928, lng:-78.712},
    gaugeName:"Gull River near Minden", gaugeStation:null,
    gaugeInfoUrl:"https://wateroffice.ec.gc.ca/search/real_time_e.html"
  },
  {
    id:'grand-cambridge-paris', name:"Cambridge to Paris", river:"Grand River",
    region:"Cambridge to Paris, ON", grade:"I (moving water)", length:"18 km",
    description:"An easy-access, beginner-friendly stretch with swift current and forested bluffs that block out the city. Shallow water keeps power boats away — the classic Southern Ontario intro trip.",
    putIn:{name:"Put-in beside the Petro-Canada, Hwy 24", lat:43.360, lng:-80.315},
    takeOut:{name:"Paris, ON take-out", lat:43.202, lng:-80.383},
    gaugeName:"Grand River near Cambridge/Paris", gaugeStation:null,
    gaugeInfoUrl:"https://wateroffice.ec.gc.ca/search/real_time_e.html"
  },
  {
    id:'humber-oldmill', name:"Old Mill Section", river:"Humber River",
    region:"Toronto, ON", grade:"II (rain-dependent, urban)", length:"5 km",
    description:"An urban surprise: after 30 mm+ of rain this creeky run through the west end delivers surfable waves and a couple of real drops, all within city limits. Scout the weirs — strong recirculation below.",
    putIn:{name:"Above Old Mill, Dundas St W", lat:43.649, lng:-79.495},
    takeOut:{name:"Humber Bay Park take-out", lat:43.632, lng:-79.475},
    gaugeName:"Humber River near Toronto", gaugeStation:null,
    gaugeInfoUrl:"https://wateroffice.ec.gc.ca/search/real_time_e.html"
  },
  {
    id:'magnetawan-lower', name:"Lower Magnetawan", river:"Magnetawan River",
    region:"Britt / Byng Inlet area, ON", grade:"II–III", length:"15 km",
    description:"A quintessential Shield-country run mixing granite scenery with dependable rapids on the way out to Georgian Bay.",
    putIn:{name:"Distress Dam access", lat:45.850, lng:-80.150},
    takeOut:{name:"Wilson's Falls area", lat:45.830, lng:-80.350},
    gaugeName:"Magnetawan River (lower reach)", gaugeStation:null,
    gaugeInfoUrl:"https://wateroffice.ec.gc.ca/search/real_time_e.html"
  }
];

const OTHER_RIVERS = [
  {name:"French River", region:"Hartley Bay area, ON", lat:45.98, lng:-80.53},
  {name:"Spanish River", region:"near Espanola, ON", lat:46.50, lng:-81.90},
  {name:"Missinaibi River", region:"remote north-eastern Ontario", lat:50.19, lng:-83.30},
  {name:"Crowe River", region:"Marmora area, ON", lat:44.50, lng:-77.70},
  {name:"Moira River", region:"Actinolite / Marmora, ON", lat:44.45, lng:-77.53},
  {name:"Mississippi River (Ontario)", region:"near High Falls, ON", lat:45.00, lng:-76.50},
  {name:"York River", region:"Bancroft, ON", lat:45.05, lng:-77.85},
  {name:"Black River", region:"Washago, ON", lat:44.75, lng:-79.30}
];

function midpoint(a,b){return {lat:(a.lat+b.lat)/2, lng:(a.lng+b.lng)/2};}

let userRuns = [];
let allRuns = [...CURATED_RUNS];
let runMarkers = {};
let putInMarker = null, takeOutMarker = null;
let pickMode = null;
let tempPutIn = null, tempTakeOut = null;
let tempSearchMarker = null;

const map = L.map('map', {zoomControl:true, attributionControl:true}).setView([45.6, -78.2], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:18,
  attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

function dotIcon(cls){
  return L.divIcon({className:'', html:'<div class="run-dot '+cls+'"></div>', iconSize:[16,16], iconAnchor:[8,8]});
}

function renderRunPins(){
  Object.values(runMarkers).forEach(m => map.removeLayer(m));
  runMarkers = {};
  allRuns.forEach(run => {
    const pin = midpoint(run.putIn, run.takeOut);
    const marker = L.marker([pin.lat, pin.lng], {icon:dotIcon('')}).addTo(map);
    marker.bindTooltip(run.name, {className:'run-tip', direction:'top', offset:[0,-6]});
    marker.on('mouseover', () => showPreview(run));
    marker.on('mouseout', () => hidePreview());
    marker.on('click', () => showDetail(run));
    runMarkers[run.id] = marker;
  });
}

function showPreview(run){
  Object.entries(runMarkers).forEach(([id,m]) => {
    if(id !== run.id) map.removeLayer(m);
  });
  const pi = run.putIn, to = run.takeOut;
  putInMarker = L.marker([pi.lat,pi.lng], {icon:dotIcon('putin')}).addTo(map).bindTooltip('Put-in: '+pi.name, {className:'run-tip', direction:'top'});
  takeOutMarker = L.marker([to.lat,to.lng], {icon:dotIcon('takeout')}).addTo(map).bindTooltip('Take-out: '+to.name, {className:'run-tip', direction:'top'});

  document.getElementById('pcRiver').textContent = run.river;
  document.getElementById('pcName').textContent = run.name;
  document.getElementById('pcRegion').textContent = run.region;
  document.getElementById('pcGrade').textContent = 'Class ' + run.grade;
  const gaugeEl = document.getElementById('pcGauge');
  gaugeEl.textContent = 'Checking gauge…';
  document.getElementById('previewCard').classList.add('show');
  fetchGauge(run, gaugeEl);
}

function hidePreview(){
  document.getElementById('previewCard').classList.remove('show');
  if(putInMarker){map.removeLayer(putInMarker); putInMarker=null;}
  if(takeOutMarker){map.removeLayer(takeOutMarker); takeOutMarker=null;}
  Object.entries(runMarkers).forEach(([id,m]) => {
    if(!map.hasLayer(m)) map.addLayer(m);
  });
}

async function fetchGauge(run, el){
  if(!run.gaugeStation){
    el.innerHTML = '<a href="'+run.gaugeInfoUrl+'" target="_blank" style="color:var(--teal)">Check gauge ↗</a>';
    return;
  }
  try{
    const url = 'https://api.weather.gc.ca/collections/hydrometric-realtime/items?f=json&STATION_NUMBER='+run.gaugeStation+'&sortby=-DATETIME&limit=1';
    const res = await fetch(url);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    const feat = data.features && data.features[0];
    if(!feat){throw new Error('no data');}
    const p = feat.properties;
    const level = p.LEVEL != null ? p.LEVEL.toFixed(2)+' m' : null;
    const flow = p.DISCHARGE != null ? p.DISCHARGE.toFixed(1)+' m³/s' : null;
    el.innerHTML = '<span class="gauge-live">'+(flow || level || 'reading n/a')+'</span>';
  }catch(e){
    el.innerHTML = '<a href="'+run.gaugeInfoUrl+'" target="_blank" style="color:var(--teal)">Live data unavailable — check ↗</a>';
  }
}

function showDetail(run){
  const pi = run.putIn, to = run.takeOut;
  const gaugeLinkHtml = run.gaugeStation
    ? '<div id="detailGaugeReading" style="font-family:\'IBM Plex Mono\',monospace;font-size:15px;color:var(--teal);margin-top:6px;">Checking gauge…</div>'
    : '';
  document.getElementById('detailInner').innerHTML =
    '<button class="back-btn" id="backBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back to map</button>'+
    '<span class="detail-river-tag">'+run.river+'</span>'+
    '<h1 class="detail-title">'+run.name+'</h1>'+
    '<div class="detail-region">'+run.region+'</div>'+
    '<div class="detail-badges">'+
      '<span class="grade-flag">Class '+run.grade+'</span>'+
      '<span class="grade-flag" style="border-color:var(--line)">'+run.length+'</span>'+
    '</div>'+
    '<p class="detail-desc">'+run.description+'</p>'+
    '<div class="detail-grid">'+
      '<div class="detail-block putin-block"><div class="db-label">Put-in</div><div class="db-name">'+pi.name+'</div><div class="db-coords">'+pi.lat.toFixed(4)+', '+pi.lng.toFixed(4)+'</div></div>'+
      '<div class="detail-block takeout-block"><div class="db-label">Take-out</div><div class="db-name">'+to.name+'</div><div class="db-coords">'+to.lat.toFixed(4)+', '+to.lng.toFixed(4)+'</div></div>'+
    '</div>'+
    '<div class="gauge-block"><div class="db-label">Gauge</div><div class="db-name">'+run.gaugeName+'</div>'+gaugeLinkHtml+
      '<div style="margin-top:8px"><a href="'+run.gaugeInfoUrl+'" target="_blank">View on Water Office ↗</a></div></div>'+
    '<p class="safety-note">Grades, gauge correlations and access points shown here are for planning reference only. Conditions on moving water change fast — always verify current levels, hazards and portage routes with a recent guidebook or local paddling club before you put on, and never run anything above your ability alone.</p>';
  document.getElementById('detailOverlay').classList.add('show');
  document.getElementById('backBtn').addEventListener('click', () => {
    document.getElementById('detailOverlay').classList.remove('show');
  });
  if(run.gaugeStation){
    fetchGauge(run, document.getElementById('detailGaugeReading'));
  }
}

document.getElementById('hamburgerBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
});
document.getElementById('closeSidebar').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
});
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

function runSearchIndex(){
  const curated = allRuns.map(r => ({label:r.name, region:r.region, lat:midpoint(r.putIn,r.takeOut).lat, lng:midpoint(r.putIn,r.takeOut).lng, run:r, curated:true}));
  const others = OTHER_RIVERS.map(r => ({label:r.name, region:r.region, lat:r.lat, lng:r.lng, run:null, curated:false}));
  return [...curated, ...others];
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '';
  if(q.length < 2) return;
  const matches = runSearchIndex().filter(item => item.label.toLowerCase().includes(q) || item.region.toLowerCase().includes(q)).slice(0,8);
  if(matches.length === 0){
    resultsEl.innerHTML = '<p class="empty-note">No matches. Try a different name, or add it under "Add a run".</p>';
    return;
  }
  matches.forEach(item => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.innerHTML = '<span>'+item.label+'</span><span class="si-region">'+item.region+'</span>'+
      '<span class="si-badge '+(item.curated?'curated':'')+'">'+(item.curated?'On the map':'Not yet mapped')+'</span>';
    div.addEventListener('click', () => {
      map.flyTo([item.lat, item.lng], item.curated ? 12 : 10);
      if(tempSearchMarker) map.removeLayer(tempSearchMarker);
      if(item.curated){
        showDetail(item.run);
      } else {
        tempSearchMarker = L.marker([item.lat, item.lng], {icon:dotIcon('other')}).addTo(map)
          .bindPopup('<strong>'+item.label+'</strong><br>'+item.region+'<br>Not yet in the database — add it from the "Add a run" tab.').openPopup();
      }
      document.getElementById('sidebar').classList.remove('open');
    });
    resultsEl.appendChild(div);
  });
});

function updatePickButtons(){
  document.getElementById('pickPutIn').classList.toggle('active-pick', pickMode==='putin');
  document.getElementById('pickPutIn').classList.toggle('set', !!tempPutIn);
  document.getElementById('pickPutIn').textContent = tempPutIn ? 'Put-in set ✓' : 'Set put-in on map';
  document.getElementById('pickTakeOut').classList.toggle('active-pick', pickMode==='takeout');
  document.getElementById('pickTakeOut').classList.toggle('set', !!tempTakeOut);
  document.getElementById('pickTakeOut').textContent = tempTakeOut ? 'Take-out set ✓' : 'Set take-out on map';
}

document.getElementById('pickPutIn').addEventListener('click', () => { pickMode = pickMode==='putin' ? null : 'putin'; updatePickButtons(); });
document.getElementById('pickTakeOut').addEventListener('click', () => { pickMode = pickMode==='takeout' ? null : 'takeout'; updatePickButtons(); });

map.on('click', (e) => {
  if(pickMode === 'putin'){
    tempPutIn = {name:'Put-in', lat:e.latlng.lat, lng:e.latlng.lng};
    pickMode = null; updatePickButtons();
  } else if(pickMode === 'takeout'){
    tempTakeOut = {name:'Take-out', lat:e.latlng.lat, lng:e.latlng.lng};
    pickMode = null; updatePickButtons();
  }
});

async function loadUserRuns(){
  try{
    const result = await window.storage.get('user-added-runs', true);
    if(result && result.value){
      userRuns = JSON.parse(result.value);
      allRuns = [...CURATED_RUNS, ...userRuns];
    }
  }catch(e){
    userRuns = [];
  }
  renderRunPins();
}

document.getElementById('submitRun').addEventListener('click', async () => {
  const name = document.getElementById('addName').value.trim();
  const river = document.getElementById('addRiver').value.trim();
  const region = document.getElementById('addRegion').value.trim();
  const grade = document.getElementById('addGrade').value;
  const desc = document.getElementById('addDesc').value.trim();
  const gaugeName = document.getElementById('addGaugeName').value.trim() || 'Not linked yet';

  if(!name || !river || !tempPutIn || !tempTakeOut){
    alert('Add a name, river, and set both the put-in and take-out on the map.');
    return;
  }
  const newRun = {
    id:'user-'+Date.now(), name, river, region: region || 'Ontario', grade: grade || 'unrated',
    length:'—', description: desc || 'No description yet.',
    putIn: tempPutIn, takeOut: tempTakeOut,
    gaugeName, gaugeStation:null, gaugeInfoUrl:'https://wateroffice.ec.gc.ca/search/real_time_e.html'
  };
  userRuns.push(newRun);
  allRuns = [...CURATED_RUNS, ...userRuns];
  try{
    await window.storage.set('user-added-runs', JSON.stringify(userRuns), true);
  }catch(e){}
  renderRunPins();
  tempPutIn = null; tempTakeOut = null; updatePickButtons();
  document.getElementById('addName').value = '';
  document.getElementById('addRiver').value = '';
  document.getElementById('addRegion').value = '';
  document.getElementById('addDesc').value = '';
  document.getElementById('addGaugeName').value = '';
  document.getElementById('sidebar').classList.remove('open');
  map.flyTo([midpoint(newRun.putIn,newRun.takeOut).lat, midpoint(newRun.putIn,newRun.takeOut).lng], 11);
});

renderRunPins();
loadUserRuns();
updatePickButtons();
</script>
</body>
</html>
